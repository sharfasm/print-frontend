<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — Printvoz</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    :root { --primary: #505039; --secondary: #A7AA63; --bg: #EAE6D2; --text: #121A1B; }
    @media (prefers-color-scheme: dark) {
      :root { --primary: #A7AA63; --secondary: #505039; --bg: #121A1B; --text: #EAE6D2; }
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
      text-align: center;
    }
    .card { max-width: 360px; }
    .logo {
      width: 64px; height: 64px; border-radius: 16px;
      background: var(--primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; margin: 0 auto 20px;
      box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
    }
    h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.55; opacity: 0.7; margin: 0 0 24px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: var(--primary); color: #fff;
      font-size: 15px; font-weight: 700;
      padding: 13px 28px; border-radius: 999px;
      transition: opacity .2s, transform .1s;
    }
    button:hover { opacity: .9; }
    button:active { transform: scale(.96); }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#e25555; margin-right:6px; vertical-align: middle; }
    .status { font-size: 12px; opacity: .55; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">P</div>
    <h1>You're offline</h1>
    <p>Looks like you've lost your connection. Your cart and saved items are safe — reconnect to keep browsing Printvoz.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="status"><span class="dot"></span>No internet connection</div>
  </div>
  <script>
    // Auto-reload when the connection returns.
    window.addEventListener("online", function () { location.reload(); });
  </script>
</body>
</html>
